name: Vault content pipeline

on:
  schedule:
    - cron: "0 6 * * *"        # every day 06:00 UTC — processes one chunk-batch, quota permitting
  workflow_dispatch: {}          # allow manual runs for testing

permissions:
  contents: write

concurrency:
  group: vault-pipeline
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet cryptography
      - name: Process one job from the encrypted queue
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          VAULT_KEY:        ${{ secrets.VAULT_KEY }}
          GEMINI_DAILY_NODES: "40"
        run: python tools/gemini_pipeline.py --queue
      - name: Commit results (CONTENT ONLY — pipeline may never touch app code)
        run: |
          git config user.name  "vault-bot"
          git config user.email "vault-bot@users.noreply.github.com"
          # hard boundary: only these data files may ever be committed by the pipeline.
          # index.html / sw.js / tools/*.py are Claude's alone; any change to them here is discarded.
          # #49: graph.json is NOT committed — the graph lives only inside the encrypted content.enc.
          git add content.enc status.json tools/queue/
          git checkout -- . 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes this run"
          else
            git commit -m "pipeline: book content update [skip ci]"
            # #51: a human push may have landed since checkout. Rebase and retry; if it truly conflicts
            # (binary content.enc), abandon THIS run cleanly — next run resumes from remote job state, no corruption.
            pushed=0
            for attempt in 1 2 3; do
              git fetch origin main
              if git rebase origin/main; then
                if git push; then pushed=1; break; fi
              else
                echo "rebase conflict — abandoning this run (next scheduled run resumes cleanly)"
                git rebase --abort || true
                break
              fi
              sleep 3
            done
            [ "$pushed" = 1 ] && echo "pushed" || echo "not pushed this run"
          fi
