<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0c12">
<title>The Vault</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vault">
<style>
:root{
  --bg:#0a0c12; --bg2:#10131d; --card:rgba(255,255,255,.045); --card2:rgba(255,255,255,.08);
  --tx:#e8e6df; --tx2:#9a97a5; --gold:#d4af37; --jade:#4ecdc4; --line:rgba(255,255,255,.09);
  --serif:Georgia,'Times New Roman',serif; --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;
  background-image:radial-gradient(1200px 600px at 70% -10%,rgba(212,175,55,.07),transparent),
                   radial-gradient(900px 500px at 0% 100%,rgba(78,205,196,.05),transparent)}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
.view{display:none;max-width:1060px;margin:0 auto;padding:20px 18px 90px}
.view.on{display:block}
.overlay{display:none;position:fixed;inset:0;background:rgba(6,8,12,.92);backdrop-filter:blur(8px);z-index:50;overflow-y:auto}
.overlay.on{display:block}

/* ---------- lock ---------- */
#lock{min-height:92vh;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px}
#lock.on{display:flex}
#lock .keyhole{font-size:64px;filter:drop-shadow(0 0 24px rgba(212,175,55,.45))}
#lock h1{font-family:var(--serif);letter-spacing:.35em;font-weight:400;font-size:26px}
#lock p{color:var(--tx2);max-width:420px;line-height:1.6}
#lock input{background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--tx);
  padding:12px 16px;width:min(420px,86vw);text-align:center;font-size:14px;outline:none}
#lock input:focus{border-color:var(--gold)}
#lock .go{background:linear-gradient(135deg,#d4af37,#a8842a);color:#14100a;font-weight:700;
  padding:11px 34px;border-radius:10px;letter-spacing:.12em}

/* ---------- header ---------- */
header{display:flex;align-items:center;gap:14px;padding:6px 0 20px;flex-wrap:wrap}
header .brand{font-family:var(--serif);font-size:20px;letter-spacing:.3em;white-space:nowrap}
header .brand span{color:var(--gold)}
.hstat{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
  border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600}
.hstat small{color:var(--tx2);font-weight:400}
#xpwrap{flex:1;min-width:140px;max-width:260px}
#xpbar{height:6px;background:var(--card2);border-radius:99px;overflow:hidden;margin-top:5px}
#xpfill{height:100%;background:linear-gradient(90deg,#8a6d1f,var(--gold));border-radius:99px;transition:width .6s}
#xpwrap .lbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--tx2)}
#xpwrap .lbl b{color:var(--gold);letter-spacing:.06em}
.iconrow{display:flex;gap:8px;margin-left:auto}
.iconbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 13px;font-size:16px;transition:.2s}
.iconbtn:hover{background:var(--card2);transform:translateY(-1px)}

/* ---------- home cards ---------- */
.bigcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;margin-bottom:16px;
  position:relative;overflow:hidden;transition:.2s}
.bigcard:hover{border-color:rgba(212,175,55,.4)}
.bigcard .tag{font-size:11px;letter-spacing:.22em;color:var(--gold);margin-bottom:8px}
#continue{cursor:pointer;display:block;width:100%;text-align:left}
#continue .ct{font-family:var(--serif);font-size:20px;margin-bottom:4px}
#continue .cs{color:var(--tx2);font-size:13.5px}
#continue .glyphbg{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:52px;opacity:.5}
.mixgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-top:12px}
.mixchip{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px;text-align:left;transition:.2s}
.mixchip:hover{background:var(--card2)}
.mixchip.done{opacity:.45}
.mixchip .g{font-size:22px}
.mixchip .t{font-size:13px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mixchip .b{font-size:11px;color:var(--tx2)}
.mixchip .ck{margin-left:auto;color:var(--jade)}

/* ---------- shelves ---------- */
.wing{margin:26px 0 10px;display:flex;align-items:baseline;gap:10px}
.wing h2{font-family:var(--serif);font-weight:400;letter-spacing:.24em;font-size:16px}
.wing small{color:var(--tx2);font-size:12px}
.shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.book{text-align:left;border-radius:14px;overflow:hidden;background:var(--card);border:1px solid var(--line);transition:.25s;display:flex;flex-direction:column}
.book:hover{transform:translateY(-4px);border-color:var(--bc,var(--gold));box-shadow:0 12px 30px -12px rgba(0,0,0,.8)}
.cover{aspect-ratio:2/2.6;display:flex;flex-direction:column;justify-content:space-between;padding:12px;position:relative}
.cover .g{font-size:30px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.cover .t{font-family:var(--serif);font-size:14.5px;line-height:1.25;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.bmeta{padding:9px 11px 11px}
.bmeta .a{font-size:11px;color:var(--tx2);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbar{height:4px;background:var(--card2);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:var(--bc,var(--gold));border-radius:99px}
.bmeta .pct{font-size:10.5px;color:var(--tx2);margin-top:5px;display:flex;justify-content:space-between}

/* ---------- reader ---------- */
#rtop{position:sticky;top:0;z-index:10;background:rgba(10,12,18,.88);backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:8px;padding:12px 4px;border-bottom:1px solid var(--line)}
#rtop .bt{font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
#rprog{position:fixed;top:0;left:0;height:3px;background:var(--gold);z-index:60;width:0}
#rbody{max-width:660px;margin:0 auto;padding:30px 2px 40px;font-family:var(--serif)}
#rbody h1{font-size:26px;font-weight:400;margin-bottom:6px;line-height:1.3}
#rbody .sub{font-family:var(--sans);color:var(--tx2);font-size:13px;margin-bottom:30px;letter-spacing:.04em}
#rbody p{line-height:1.75;margin-bottom:1.15em;color:#ded9cf}
#rbody p:first-of-type::first-letter{font-size:3.1em;float:left;line-height:.85;padding:4px 8px 0 0;color:var(--gold)}
#rend{max-width:660px;margin:0 auto;text-align:center;padding-bottom:30px}
#rend .done-line{color:var(--tx2);font-size:13px;letter-spacing:.2em;margin:18px 0}
.goldbtn{background:linear-gradient(135deg,#d4af37,#9c7b26);color:#151006;font-weight:800;letter-spacing:.1em;
  padding:14px 30px;border-radius:12px;font-size:14px;box-shadow:0 8px 24px -8px rgba(212,175,55,.5);transition:.2s}
.goldbtn:hover{transform:translateY(-2px)}
.ghostbtn{border:1px solid var(--line);border-radius:12px;padding:13px 26px;color:var(--tx);font-size:13.5px;margin:6px;transition:.2s}
.ghostbtn:hover{background:var(--card2)}
#hlbtn{position:absolute;z-index:70;background:var(--gold);color:#151006;font-weight:700;font-size:12.5px;
  padding:7px 13px;border-radius:99px;display:none;box-shadow:0 6px 18px rgba(0,0,0,.5)}

/* ---------- drawer / panels ---------- */
.panel{max-width:660px;margin:40px auto;padding:0 18px 60px}
.panel h2{font-family:var(--serif);font-weight:400;letter-spacing:.2em;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.panel .x{margin-left:auto;font-size:22px;color:var(--tx2)}
.eprow{display:flex;gap:10px;align-items:center;width:100%;text-align:left;padding:11px 12px;border-radius:10px;border:1px solid transparent}
.eprow:hover{background:var(--card)}
.eprow.cur{border-color:var(--gold)}
.eprow .n{color:var(--tx2);font-size:12px;min-width:26px}
.eprow .t{font-size:14px;flex:1}
.eprow .ck{color:var(--jade)}
#sinput{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
  color:var(--tx);font-size:15px;outline:none;margin-bottom:16px}
#sinput:focus{border-color:var(--gold)}
.srow{display:block;width:100%;text-align:left;padding:12px;border-radius:10px;margin-bottom:4px}
.srow:hover{background:var(--card)}
.srow .w{font-size:11.5px;color:var(--gold);letter-spacing:.08em}
.srow .s{font-size:13.5px;color:var(--tx2);line-height:1.5;margin-top:3px}
.srow .s mark{background:rgba(212,175,55,.3);color:var(--tx);border-radius:3px;padding:0 2px}
.hlrow{background:var(--card);border-left:3px solid var(--gold);border-radius:8px;padding:13px 15px;margin-bottom:10px}
.hlrow .q{font-family:var(--serif);font-size:14.5px;line-height:1.6}
.hlrow .m{font-size:11.5px;color:var(--tx2);margin-top:7px;display:flex;justify-content:space-between}
.achgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.ach{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;text-align:center}
.ach.no{opacity:.3;filter:grayscale(1)}
.ach .e{font-size:28px}
.ach .n{font-weight:700;font-size:13px;margin:7px 0 3px}
.ach .d{font-size:11px;color:var(--tx2);line-height:1.4}

/* ---------- flow mode ---------- */
#flow .fwrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:20px}
#fword{font-family:var(--serif);font-size:clamp(34px,7vw,64px);min-height:1.4em;text-align:center}
#fword b{color:var(--gold)}
#fctrl{display:flex;align-items:center;gap:16px;color:var(--tx2);font-size:13px;flex-wrap:wrap;justify-content:center}
#fctrl input[type=range]{accent-color:var(--gold);width:160px}
#fprog{width:min(420px,80vw);height:4px;background:var(--card2);border-radius:99px;overflow:hidden}
#fpfill{height:100%;background:var(--gold);width:0}

/* ---------- generative art & motion ---------- */
#rbanner{display:block;width:100%;height:150px;margin:16px auto 4px;border-radius:14px;border:1px solid var(--line)}
#rbody p,#rbody blockquote{opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s ease}
#rbody p.vis,#rbody blockquote.vis{opacity:1;transform:none}
#rbody .pull{font-size:1.22em;font-style:italic;text-align:center;color:var(--gold);
  padding:10px 6px;margin:1.5em 0;line-height:1.65}
#rbody .pull::before,#rbody .pull::after{content:"— ✦ —";display:block;color:var(--tx2);
  font-size:11px;letter-spacing:.45em;font-style:normal;margin:10px 0}
/* ---------- side illustrations ---------- */
.rdbody figure.sidefig{float:right;width:170px;margin:8px -10px 16px 22px;padding:14px 14px 12px;
  background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid var(--line);border-radius:16px;text-align:center;box-shadow:0 10px 26px -14px rgba(0,0,0,.7);
  opacity:0;transform:translateY(12px) scale(.96);transition:opacity .6s ease,transform .6s ease}
.rdbody figure.sidefig.left{float:left;margin:8px 22px 16px -10px}
.rdbody figure.sidefig.vis{opacity:1;transform:none}
.rdbody figure.sidefig svg{width:100%;height:118px;display:block;overflow:visible}
.rdbody figure.sidefig figcaption{font-family:var(--sans);font-size:10.5px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--tx2);margin-top:10px}
.rdbody figure.sidefig svg [class^="an-"]{transform-box:fill-box;transform-origin:center}
@keyframes fspin{to{transform:rotate(360deg)}}
@keyframes fbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fbreathe{0%,100%{transform:scale(.82)}50%{transform:scale(1.06)}}
@keyframes fflick{0%,100%{transform:scaleY(1) rotate(0);opacity:1}50%{transform:scaleY(1.12) rotate(-1deg);opacity:.82}}
@keyframes fpulse{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes froll{to{transform:rotate(360deg)}}
.an-spin{animation:fspin 16s linear infinite}
.an-bob{animation:fbob 3.6s ease-in-out infinite}
.an-breathe{animation:fbreathe 5s ease-in-out infinite}
.an-flick{animation:fflick 1.5s ease-in-out infinite;transform-origin:50% 90%!important}
.an-pulse{animation:fpulse 2.6s ease-in-out infinite}
.an-roll{animation:froll 7s linear infinite}
@media(max-width:560px){.rdbody figure.sidefig{float:none!important;width:auto;max-width:230px;margin:18px auto!important}}
@media (prefers-reduced-motion:reduce){
  #rbody p,#rbody blockquote,.rdbody figure.sidefig{opacity:1;transform:none;transition:none}
  .rdbody figure.sidefig svg *{animation:none!important}
}

/* ---------- top bar + nav ---------- */
#topbar{display:none;align-items:center;gap:12px;max-width:1060px;margin:0 auto;padding:14px 18px 12px;flex-wrap:wrap}
#topbar .brand{font-family:var(--serif);font-size:19px;letter-spacing:.28em;white-space:nowrap}
#topbar .brand span{color:var(--gold)}
.nav{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
.navbtn{padding:7px 15px;border-radius:999px;font-size:13px;color:var(--tx2);font-weight:600;transition:.2s}
.navbtn.on{background:var(--card2);color:var(--tx)}

/* ---------- the path (skill tree) ---------- */
#path{padding-top:6px}
#tree{display:flex;gap:16px;overflow-x:auto;padding:8px 2px 24px}
.track{min-width:250px;max-width:290px;flex:0 0 auto}
.track-h{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:13px;background:var(--card);
  border:1px solid var(--line);border-left:3px solid var(--tacc,var(--gold))}
.track-h .tg{font-size:22px}
.track-h .tn{font-family:var(--serif);font-size:15px;line-height:1.15}
.track-h .tp{margin-left:auto;font-size:11px;color:var(--tx2);white-space:nowrap}
.track-blurb{font-size:11.5px;color:var(--tx2);line-height:1.45;margin:9px 4px 14px}
.tnode{position:relative;display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;
  padding:12px;border-radius:13px;border:1px solid var(--line);background:var(--card);margin-bottom:20px;transition:.18s}
.tnode:not(:last-child)::after{content:"";position:absolute;left:27px;bottom:-20px;height:20px;width:2px;background:var(--line)}
.tnode .ng{font-size:22px;width:28px;text-align:center;flex:0 0 auto;line-height:1.1}
.tnode .ntx{flex:1;min-width:0}
.tnode .stg{display:block;font-size:9.5px;letter-spacing:.24em;color:var(--tacc,var(--gold));opacity:.8;margin-bottom:3px}
.tnode.locked .stg{color:var(--tx2)}
.tnode .nt{font-size:13.5px;font-weight:600;line-height:1.3}
.tnode .nsub{font-size:11px;color:var(--tx2);margin-top:4px;line-height:1.35}
.tnode .badge{flex:0 0 auto;font-size:15px;margin-left:4px}
.tnode.avail{cursor:pointer;border-color:var(--tacc,var(--gold));box-shadow:0 0 0 1px var(--tacc,var(--gold)) inset}
.tnode.avail:hover{background:var(--card2);transform:translateX(3px)}
.tnode.avail .ng{filter:drop-shadow(0 0 7px var(--tacc,#d4af37))}
.tnode.done{cursor:pointer;border-color:#2f7d55}
.tnode.done .badge{color:var(--jade)}
.tnode.locked{opacity:.48}
.tnode.locked .ng{filter:grayscale(1)}
.tnode.just{animation:unlockpop .7s ease-out}
@keyframes unlockpop{0%{transform:scale(.9);box-shadow:0 0 0 0 var(--tacc,#d4af37)}
  40%{transform:scale(1.03);box-shadow:0 0 24px -2px var(--tacc,#d4af37)}100%{transform:none}}
#pathcont .glyphbg{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:46px;opacity:.5}

/* ---------- node view ---------- */
#rprog2{position:fixed;top:0;left:0;height:3px;background:var(--jade);z-index:60;width:0}
#nbody{max-width:660px;margin:0 auto;padding:24px 2px 20px;font-family:var(--serif)}
#nbody h1{font-size:25px;font-weight:400;margin-bottom:6px;line-height:1.28}
#nbody .nsubh{font-family:var(--sans);color:var(--tx2);font-size:12px;letter-spacing:.05em;margin-bottom:22px}
#nbody .lblrow{font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin:8px 0 14px}
#nbody .lblrow.guide{color:var(--gold)}
#nbody .lblrow.books{color:var(--jade);margin-top:28px;border-top:1px solid var(--line);padding-top:24px}
#nbody>p{line-height:1.75;margin-bottom:1.12em;color:#ded9cf}
#nbody>p:first-of-type::first-letter{font-size:3em;float:left;line-height:.85;padding:4px 8px 0 0;color:var(--gold)}
#nbody .src{background:var(--card);border-left:3px solid var(--jade);border-radius:9px;padding:13px 16px;margin-bottom:14px}
#nbody .src .attr{font-family:var(--sans);font-size:11px;color:var(--tx2);margin-bottom:7px;letter-spacing:.03em}
#nbody .src p{margin-bottom:.5em;line-height:1.65;font-size:.99em}
#nbody .src p:last-child{margin-bottom:0}

/* ---------- gate: quiz + apply ---------- */
#ngate{max-width:660px;margin:0 auto;padding:6px 2px 40px}
.gatecard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:16px}
.gatecard h3{font-family:var(--serif);font-weight:400;font-size:19px;margin-bottom:4px}
.gatecard .gsub{color:var(--tx2);font-size:12.5px;margin-bottom:16px}
.qitem{margin-bottom:18px}
.qitem .qq{font-size:15px;margin-bottom:10px;line-height:1.4}
.qitem .qnum{color:var(--jade);font-weight:700;margin-right:6px}
.choice{display:block;width:100%;text-align:left;padding:11px 14px;border-radius:10px;border:1px solid var(--line);
  background:var(--bg2);margin-bottom:7px;font-size:13.5px;transition:.15s;color:var(--tx)}
.choice:hover{border-color:var(--tx2)}
.choice.sel{border-color:var(--gold);background:rgba(212,175,55,.12)}
.choice.right{border-color:#2f7d55;background:rgba(46,125,85,.18)}
.choice.wrong{border-color:#a33;background:rgba(170,50,50,.16)}
.qwhy{font-size:12.5px;color:var(--tx2);margin-top:6px;padding-left:4px;line-height:1.5;display:none}
.qwhy.on{display:block}
.qwhy b{color:var(--jade)}
#applybox textarea{width:100%;min-height:120px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
  color:var(--tx);padding:14px;font-family:var(--serif);font-size:15px;line-height:1.6;resize:vertical;outline:none}
#applybox textarea:focus{border-color:var(--gold)}
#applybox .cc{font-size:11.5px;color:var(--tx2);margin-top:8px;text-align:right}
.gatemsg{font-size:13px;margin-top:12px;padding:10px 14px;border-radius:10px}
.gatemsg.bad{background:rgba(170,50,50,.14);color:#e8b0b0}
.gatemsg.good{background:rgba(46,125,85,.16);color:#a7dcc0}
.locknote{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:20px;text-align:center;color:var(--tx2);margin-top:16px}
.stubnote{background:var(--card);border:1px dashed var(--gold);border-radius:14px;padding:22px;text-align:center;margin-top:16px}
.stubnote .e{font-size:32px}
@media(max-width:560px){.track{min-width:82vw;max-width:82vw}}

/* ---------- toasts ---------- */
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#1a1608;border:1px solid var(--gold);color:var(--tx);padding:12px 22px;border-radius:99px;
  font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.6);animation:pop .3s ease-out}
.toast.big{font-size:16px;padding:16px 30px;border-radius:16px;text-align:center}
@keyframes pop{from{transform:scale(.8) translateY(14px);opacity:0}to{transform:scale(1);opacity:1}}
.fadeout{animation:fout .5s forwards}
@keyframes fout{to{opacity:0;transform:translateY(10px)}}
#loading{min-height:92vh;display:flex;flex-direction:column;gap:16px;align-items:center;justify-content:center;color:var(--tx2)}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--card2);border-top-color:var(--gold);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:560px){
  .shelf{grid-template-columns:repeat(auto-fill,minmax(118px,1fr))}
  header .brand{font-size:16px}
  #rbody{font-size:15px}
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div>Unsealing the vault…</div></div>

<div id="lock" class="view">
  <div class="keyhole">🗝️</div>
  <h1>THE VAULT</h1>
  <p>This library opens only for its keyholder. Open the vault through your original link — the key rides inside it. Or paste your key below.</p>
  <input id="keyin" placeholder="paste key…" autocomplete="off">
  <button class="go" id="keygo">UNLOCK</button>
  <button class="ghostbtn" id="keybio" style="display:none">👁️ Unlock with Windows Hello</button>
  <p id="keyerr" style="color:#e74c3c;font-size:13px"></p>
</div>

<div id="topbar">
  <div class="brand">🗝️ THE <span>VAULT</span></div>
  <div class="nav">
    <button class="navbtn on" id="nav-path">🗺️ Path</button>
    <button class="navbtn" id="nav-lib">📚 Library</button>
  </div>
  <div class="hstat" id="streak">🔥 0 <small>streak</small></div>
  <div id="xpwrap">
    <div class="lbl"><b id="lvlname">INITIATE</b><span id="xptext"></span></div>
    <div id="xpbar"><div id="xpfill"></div></div>
  </div>
  <div class="iconrow">
    <button class="iconbtn" id="btn-search" title="Search">🔍</button>
    <button class="iconbtn" id="btn-hl" title="Highlights">⭐</button>
    <button class="iconbtn" id="btn-ach" title="Achievements">🏆</button>
    <button class="iconbtn" id="btn-bio" title="Enable face unlock on this device">👁️</button>
  </div>
</div>

<div id="path" class="view">
  <button class="bigcard" id="pathcont" style="display:none"></button>
  <div id="tree"></div>
</div>

<div id="home" class="view">
  <button class="bigcard" id="continue" style="display:none"></button>
  <div class="bigcard">
    <div class="tag">⚗️ TODAY'S MIX — <span id="mixsub"></span></div>
    <div class="mixgrid" id="mixgrid"></div>
  </div>
  <div id="shelves"></div>
</div>

<div id="reader" class="view">
  <div id="rprog"></div>
  <div id="rtop">
    <button class="iconbtn" id="r-back" title="Library">←</button>
    <div class="bt" id="r-title"></div>
    <button class="iconbtn" id="r-fminus" title="Smaller text">A−</button>
    <button class="iconbtn" id="r-fplus" title="Bigger text">A+</button>
    <button class="iconbtn" id="r-flow" title="Flow mode">⚡</button>
    <button class="iconbtn" id="r-list" title="Episodes">☰</button>
  </div>
  <div id="rbody" class="rdbody"></div>
  <div id="rend"></div>
</div>

<div id="node" class="view">
  <div id="rprog2"></div>
  <div id="rtop">
    <button class="iconbtn" id="n-back" title="Path">←</button>
    <div class="bt" id="n-title"></div>
    <button class="iconbtn" id="n-fminus" title="Smaller text">A−</button>
    <button class="iconbtn" id="n-fplus" title="Bigger text">A+</button>
  </div>
  <div id="nbody" class="rdbody"></div>
  <div id="ngate"></div>
</div>

<div class="overlay" id="eplist"><div class="panel"><h2>☰ EPISODES <button class="x" data-close="eplist">✕</button></h2><div id="eprows"></div></div></div>
<div class="overlay" id="search"><div class="panel"><h2>🔍 SEARCH <button class="x" data-close="search">✕</button></h2><input id="sinput" placeholder="search all books…" autocomplete="off"><div id="sres"></div></div></div>
<div class="overlay" id="hls"><div class="panel"><h2>⭐ HIGHLIGHTS <button class="x" data-close="hls">✕</button></h2><div id="hlrows"></div></div></div>
<div class="overlay" id="achs"><div class="panel" style="max-width:820px"><h2>🏆 ACHIEVEMENTS <span id="achcount" style="font-size:13px;color:var(--tx2)"></span> <button class="x" data-close="achs">✕</button></h2><div class="achgrid" id="achgrid"></div></div></div>
<div class="overlay" id="flow"><div class="fwrap">
  <div id="fword"></div>
  <div id="fprog"><div id="fpfill"></div></div>
  <div id="fctrl">
    <button class="ghostbtn" id="f-play">⏸ pause</button>
    <label>speed <input type="range" id="f-wpm" min="150" max="700" step="25"> <span id="f-wpmv"></span> wpm</label>
    <button class="ghostbtn" data-close="flow">✕ exit</button>
  </div>
</div></div>

<button id="hlbtn">⭐ Save highlight</button>
<div id="toasts"></div>

<script>
"use strict";
/* ============ state ============ */
const LS_KEY="vault_key", LS_ST="vault_state";
let DATA=null, S=null;
const today=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const yesterday=()=>{const d=new Date(Date.now()-864e5);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
function loadS(){try{S=JSON.parse(localStorage.getItem(LS_ST))||{}}catch(e){S={}}
  S.xp??=0; S.read??={}; S.pos??={}; S.streak??={count:0,day:""}; S.ach??=[]; S.hl??=[];
  S.font??=17; S.wpm??=350; S.days??={}; S.mix??=null; S.node??={};}
const save=()=>localStorage.setItem(LS_ST,JSON.stringify(S));
const $=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement("div");d.textContent=s;return d.innerHTML};
const bookById=id=>DATA.books.find(b=>b.id===id);
const epWords=ep=>ep.p.reduce((n,p)=>n+p.split(" ").length,0);
const epXP=ep=>Math.max(10,Math.round(epWords(ep)/10));
const readSet=b=>new Set(S.read[b]||[]);
const isRead=(b,e)=>readSet(b).has(e);
const totalRead=()=>Object.values(S.read).reduce((n,a)=>n+a.length,0);

/* ============ gamification ============ */
const LVLS=["Initiate","Acolyte","Apprentice","Reader","Adept","Scholar","Sage","Strategist","Mentalist","Illuminate","Grandmaster","Keeper of the Vault"];
const lvl=()=>Math.floor(Math.sqrt(S.xp/150))+1;
const lvlFloor=l=>150*(l-1)*(l-1), lvlCeil=l=>150*l*l;
const lvlName=()=>LVLS[Math.min(lvl()-1,LVLS.length-1)].toUpperCase();
const ACH=[
 {id:"first",e:"🔑",n:"First Key",d:"Complete your first episode",c:()=>totalRead()>=1},
 {id:"ep10",e:"📖",n:"Ten Deep",d:"Complete 10 episodes",c:()=>totalRead()>=10},
 {id:"ep50",e:"🧭",n:"Half Century",d:"Complete 50 episodes",c:()=>totalRead()>=50},
 {id:"ep100",e:"🏛️",n:"Centurion",d:"Complete 100 episodes",c:()=>totalRead()>=100},
 {id:"streak3",e:"🔥",n:"Kindling",d:"3-day reading streak",c:()=>S.streak.count>=3},
 {id:"streak7",e:"🕯️",n:"Eternal Flame",d:"7-day reading streak",c:()=>S.streak.count>=7},
 {id:"streak30",e:"💥",n:"Obsessed",d:"30-day reading streak",c:()=>S.streak.count>=30},
 {id:"balance",e:"☯️",n:"Balanced Mind",d:"Read shadow & light in one day",c:()=>{const d=S.days[today()];return d&&d.shadow&&d.light}},
 {id:"owl",e:"🦉",n:"Night Owl",d:"Finish an episode after midnight",c:()=>S.owlFlag},
 {id:"bird",e:"🌅",n:"Dawn Reader",d:"Finish an episode before 8 am",c:()=>S.birdFlag},
 {id:"mix",e:"🎛️",n:"Mixmaster",d:"Clear a full Daily Mix",c:()=>S.mix&&S.mix.day===today()&&S.mix.items.every(i=>isRead(i.b,i.e))},
 {id:"hl1",e:"⭐",n:"Collector",d:"Save your first highlight",c:()=>S.hl.length>=1},
 {id:"hl25",e:"🗃️",n:"Archivist",d:"Save 25 highlights",c:()=>S.hl.length>=25},
 {id:"lvl5",e:"🎖️",n:"Adept",d:"Reach level 5",c:()=>lvl()>=5},
 {id:"lvl10",e:"👁️",n:"Illuminate",d:"Reach level 10",c:()=>lvl()>=10},
 {id:"bookdone",e:"📕",n:"The Last Page",d:"Finish an entire book",c:()=>DATA.books.some(b=>readSet(b.id).size>=b.episodes.length)},
 {id:"vault",e:"🗝️",n:"Keeper of the Vault",d:"Finish every book",c:()=>DATA.books.every(b=>readSet(b.id).size>=b.episodes.length)},
 {id:"path1",e:"🧗",n:"First Step",d:"Master your first Path idea",c:()=>nodesDone()>=1},
 {id:"rooted",e:"🌱",n:"Rooted",d:"Complete the Foundations track",c:()=>trackDone("A")},
 {id:"jhana1",e:"🕯️",n:"Absorbed",d:"Reach the First Jhāna",c:()=>nodeDone("b6")},
 {id:"lens",e:"🔆",n:"The Lens",d:"Complete the Concentration track",c:()=>trackDone("B")},
 {id:"path10",e:"🗺️",n:"Pathfinder",d:"Master 10 Path ideas",c:()=>nodesDone()>=10},
];
function checkAch(){for(const a of ACH){if(!S.ach.includes(a.id)&&a.c()){S.ach.push(a.id);toast(`${a.e} Achievement — ${a.n}`,true)}}save()}
function toast(msg,big){const t=document.createElement("div");t.className="toast"+(big?" big":"");t.textContent=msg;
 $("toasts").appendChild(t);setTimeout(()=>{t.classList.add("fadeout");setTimeout(()=>t.remove(),500)},big?3400:2300)}

/* ============ crypto load ============ */
const b64d=s=>{s=s.replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u};
async function tryLoad(k){
  const raw=await(await fetch("content.enc",{cache:"no-cache"})).arrayBuffer();
  const key=await crypto.subtle.importKey("raw",b64d(k),"AES-GCM",false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(raw.slice(0,12))},key,raw.slice(12));
  const txt=await new Response(new Response(pt).body.pipeThrough(new DecompressionStream("gzip"))).text();
  return JSON.parse(txt);
}
async function boot(){
  loadS();
  const hashK=(location.hash.match(/k=([A-Za-z0-9_-]+)/)||[])[1];
  const k=hashK||localStorage.getItem(LS_KEY);
  $("loading").style.display="none";
  if(!k){showLock();return}
  $("loading").style.display="flex";
  try{DATA=await tryLoad(k);localStorage.setItem(LS_KEY,k)}
  catch(e){$("loading").style.display="none";showLock();$("keyerr").textContent=hashK?"That key doesn't fit this lock.":"";return}
  $("loading").style.display="none";
  landing();checkAch();
  if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
}
function landing(){ if(DATA.nodes&&DATA.nodes.length){renderPath();show("path")} else {renderHome();show("home")} }
$("keygo").onclick=async()=>{const k=$("keyin").value.trim();if(!k)return;
  try{DATA=await tryLoad(k);localStorage.setItem(LS_KEY,k);landing()}
  catch(e){$("keyerr").textContent="That key doesn't fit this lock."}};

/* ============ views ============ */
function show(v){for(const el of document.querySelectorAll(".view"))el.classList.remove("on");
  for(const el of document.querySelectorAll(".overlay"))el.classList.remove("on");
  if(v!=="reader")stopArt();
  $("topbar").style.display=(v==="home"||v==="path")?"flex":"none";
  if(v==="home"||v==="path")setNav(v);
  $(v).classList.add("on");window.scrollTo(0,0)}
function setNav(v){$("nav-path").classList.toggle("on",v==="path");$("nav-lib").classList.toggle("on",v==="home")}
function renderTopbar(){
  $("streak").innerHTML=`🔥 ${S.streak.count} <small>streak</small>`;
  const l=lvl(),lo=lvlFloor(l),hi=lvlCeil(l);
  $("lvlname").textContent="LV "+l+" · "+lvlName();
  $("xptext").textContent=`${S.xp-lo} / ${hi-lo} XP`;
  $("xpfill").style.width=Math.min(100,(S.xp-lo)/(hi-lo)*100)+"%";
}
$("nav-path").onclick=()=>{renderPath();show("path")};
$("nav-lib").onclick=()=>{renderHome();show("home")};
function showLock(){show("lock");$("keybio").style.display=localStorage.getItem("vault_bio")?"inline-block":"none"}
document.addEventListener("click",e=>{const c=e.target.closest("[data-close]");if(c){$(c.dataset.close).classList.remove("on");stopFlow()}});

/* ---------- home ---------- */
function renderHome(){
  renderTopbar();
  // continue card
  const c=$("continue");
  if(S.last&&S.pos[S.last]){const b=bookById(S.last);if(b){const ep=b.episodes[S.pos[S.last].ep];
    c.style.display="block";
    c.innerHTML=`<div class="tag">▶ CONTINUE READING</div><div class="ct">${esc(ep.t)}</div>
      <div class="cs">${esc(b.title)} — episode ${S.pos[S.last].ep+1} of ${b.episodes.length}</div>
      <div class="glyphbg">${b.glyph}</div>`;
    c.onclick=()=>openEp(b.id,S.pos[S.last].ep);}}
  renderMix();
  // shelves
  const wings=[["shadow","🌑 THE SHADOW WING","power · persuasion · defense against both"],["light","🌕 THE LIGHT WING","stillness · clarity · the mind itself"]];
  const sh=$("shelves");sh.innerHTML="";
  for(const[w,label,sub]of wings){
    const head=document.createElement("div");head.className="wing";head.innerHTML=`<h2>${label}</h2><small>${sub}</small>`;
    const grid=document.createElement("div");grid.className="shelf";
    for(const b of DATA.books.filter(x=>x.wing===w)){
      const done=readSet(b.id).size,pct=Math.round(done/b.episodes.length*100);
      const el=document.createElement("button");el.className="book";el.style.setProperty("--bc",b.accent);
      el.innerHTML=`<div class="cover" style="background:linear-gradient(160deg,${b.accent}55,${b.accent}18 55%,rgba(0,0,0,.35))">
          <div class="g">${b.glyph}</div><div class="t">${esc(b.title)}</div></div>
        <div class="bmeta">
          <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
          <div class="pct"><span>${done}/${b.episodes.length} eps</span><span>${pct}%</span></div></div>`;
      el.onclick=()=>openBook(b.id);grid.appendChild(el);}
    sh.appendChild(head);sh.appendChild(grid);}
}
/* ---------- daily mix ---------- */
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function buildMix(){
  const d=today();
  if(S.mix&&S.mix.day===d)return;
  let seed=0;for(const ch of d)seed=seed*31+ch.charCodeAt(0)|0;
  const rnd=mulberry(seed);
  const pool={shadow:[],light:[]};
  for(const b of DATA.books){const rs=readSet(b.id);
    for(let i=0;i<b.episodes.length;i++)if(!rs.has(i))pool[b.wing].push({b:b.id,e:i});}
  const items=[];const order=rnd()<.5?["shadow","light","shadow","light"]:["light","shadow","light","shadow"];
  for(const w of order){const p=pool[w];if(!p.length)continue;
    const pick=p.splice(Math.floor(rnd()*p.length),1)[0];items.push(pick);}
  S.mix={day:d,items};save();
}
function renderMix(){
  buildMix();
  const doneN=S.mix.items.filter(i=>isRead(i.b,i.e)).length;
  $("mixsub").textContent=doneN>=S.mix.items.length&&S.mix.items.length?"CLEARED ✓":`${doneN}/${S.mix.items.length} — a fresh blend every day`;
  const g=$("mixgrid");g.innerHTML="";
  for(const it of S.mix.items){const b=bookById(it.b);if(!b)continue;const ep=b.episodes[it.e];const done=isRead(it.b,it.e);
    const el=document.createElement("button");el.className="mixchip"+(done?" done":"");
    el.innerHTML=`<div class="g">${b.glyph}</div><div><div class="t">${esc(ep.t)}</div>
      <div class="b">${esc(b.title)} · ${Math.max(1,Math.round(epWords(ep)/230))} min</div></div>${done?'<div class="ck">✓</div>':""}`;
    el.onclick=()=>openEp(it.b,it.e);g.appendChild(el);}
}
/* ---------- reader ---------- */
let CUR={b:null,e:0};
function openBook(id){const b=bookById(id);const rs=readSet(id);
  let e=S.pos[id]?S.pos[id].ep:0;
  if(rs.has(e)){let n=b.episodes.findIndex((_,i)=>!rs.has(i));if(n>=0)e=n}
  openEp(id,e)}
function openEp(id,e){
  const b=bookById(id);if(!b)return;CUR={b:id,e};S.last=id;S.pos[id]={ep:e,scroll:0};save();
  const ep=b.episodes[e];
  $("r-title").textContent=`${b.glyph} ${b.title} — ${e+1}/${b.episodes.length}`;
  const body=$("rbody");body.innerHTML="";body.style.fontSize=S.font+"px";
  const cv=document.createElement("canvas");cv.id="rbanner";body.appendChild(cv);
  const h=document.createElement("h1");h.textContent=ep.t;body.appendChild(h);
  const sub=document.createElement("div");sub.className="sub";
  sub.textContent=`${b.title.toUpperCase()} · EPISODE ${e+1} OF ${b.episodes.length} · ${Math.max(1,Math.round(epWords(ep)/230))} MIN · +${epXP(ep)} XP`;
  body.appendChild(sub);
  const pull=pickPull(ep);
  ep.p.forEach((p,i)=>{const el=document.createElement(i===pull?"blockquote":"p");
    if(i===pull)el.className="pull";el.textContent=p;body.appendChild(el)});
  injectFigures(body,ep,b);
  renderEnd();show("reader");
  const sv=S.pos[id];window.scrollTo(0,sv&&sv.scroll?sv.scroll:0);
  revealVisible(1.3);
  drawArt(cv,b,e);
}
function renderEnd(){
  const b=bookById(CUR.b),ep=b.episodes[CUR.e],end=$("rend");end.innerHTML="";
  if(isRead(CUR.b,CUR.e)){const d=document.createElement("div");d.className="done-line";d.textContent="— ✓ COMPLETED —";end.appendChild(d)}
  else{const btn=document.createElement("button");btn.className="goldbtn";btn.textContent=`MARK COMPLETE  +${epXP(ep)} XP`;
    btn.onclick=()=>complete();end.appendChild(btn)}
  const nav=document.createElement("div");nav.style.marginTop="14px";
  if(CUR.e>0){const p=document.createElement("button");p.className="ghostbtn";p.textContent="← prev";p.onclick=()=>openEp(CUR.b,CUR.e-1);nav.appendChild(p)}
  if(CUR.e<b.episodes.length-1){const n=document.createElement("button");n.className="ghostbtn";
    n.textContent=`next: ${b.episodes[CUR.e+1].t.slice(0,34)} →`;n.onclick=()=>openEp(CUR.b,CUR.e+1);nav.appendChild(n)}
  end.appendChild(nav);
}
function complete(){
  const b=bookById(CUR.b),ep=b.episodes[CUR.e];
  if(isRead(CUR.b,CUR.e))return;
  (S.read[CUR.b]??=[]).push(CUR.e);
  const before=lvl();S.xp+=epXP(ep);
  const d=today();
  if(S.streak.day!==d){S.streak.count=S.streak.day===yesterday()?S.streak.count+1:1;S.streak.day=d}
  (S.days[d]??={})[b.wing]=true;
  const hr=new Date().getHours();if(hr<5)S.owlFlag=true;else if(hr<8)S.birdFlag=true;
  save();
  toast(`+${epXP(ep)} XP`);
  if(lvl()>before)setTimeout(()=>toast(`⬆ LEVEL ${lvl()} — ${lvlName()}`,true),600);
  checkAch();renderEnd();
}
// reveal fade-up elements once they're near the viewport (robust, no IntersectionObserver dependency)
function revealVisible(factor){
  const h=window.innerHeight*(factor||1.05);
  for(const el of document.querySelectorAll("#rbody p:not(.vis),#rbody blockquote:not(.vis),.rdbody figure.sidefig:not(.vis)"))
    if(el.getBoundingClientRect().top<h)el.classList.add("vis");
}
// scroll progress + position save
let scrollT;window.addEventListener("scroll",()=>{
  if(!$("reader").classList.contains("on"))return;
  revealVisible();
  const h=document.documentElement,max=h.scrollHeight-h.clientHeight;
  $("rprog").style.width=(max>0?h.scrollTop/max*100:0)+"%";
  clearTimeout(scrollT);scrollT=setTimeout(()=>{if(CUR.b){S.pos[CUR.b]={ep:CUR.e,scroll:h.scrollTop};save()}},300);
},{passive:true});
$("r-back").onclick=()=>{renderHome();show("home")};
$("r-fminus").onclick=()=>{S.font=Math.max(14,S.font-1);$("rbody").style.fontSize=S.font+"px";save()};
$("r-fplus").onclick=()=>{S.font=Math.min(24,S.font+1);$("rbody").style.fontSize=S.font+"px";save()};
$("r-list").onclick=()=>{const b=bookById(CUR.b);const w=$("eprows");w.innerHTML="";
  b.episodes.forEach((ep,i)=>{const r=document.createElement("button");r.className="eprow"+(i===CUR.e?" cur":"");
    r.innerHTML=`<span class="n">${i+1}</span><span class="t">${esc(ep.t)}</span>${isRead(b.id,i)?'<span class="ck">✓</span>':""}`;
    r.onclick=()=>{$("eplist").classList.remove("on");openEp(b.id,i)};w.appendChild(r)});
  $("eplist").classList.add("on");
  const cur=w.querySelector(".cur");if(cur)cur.scrollIntoView({block:"center"})};

/* ---------- highlights ---------- */
const hlBtn=$("hlbtn");
document.addEventListener("selectionchange",()=>{
  if(!$("reader").classList.contains("on")){hlBtn.style.display="none";return}
  const sel=document.getSelection();
  if(sel.isCollapsed||!$("rbody").contains(sel.anchorNode)){hlBtn.style.display="none";return}
  const r=sel.getRangeAt(0).getBoundingClientRect();
  hlBtn.style.display="block";
  hlBtn.style.left=Math.max(8,Math.min(window.innerWidth-160,r.left+r.width/2-70))+"px";
  hlBtn.style.top=(r.top+window.scrollY-44)+"px";
});
hlBtn.onclick=()=>{const sel=document.getSelection();const t=sel.toString().trim().slice(0,600);
  if(!t)return;S.hl.unshift({b:CUR.b,e:CUR.e,t});save();sel.removeAllRanges();hlBtn.style.display="none";
  toast("⭐ Highlight saved");checkAch()};

$("btn-search").onclick=()=>{$("search").classList.add("on");$("sinput").value="";$("sres").innerHTML="";setTimeout(()=>$("sinput").focus(),50)};
let sT;$("sinput").addEventListener("input",()=>{clearTimeout(sT);sT=setTimeout(doSearch,250)});
function doSearch(){
  const q=$("sinput").value.trim().toLowerCase();const w=$("sres");w.innerHTML="";
  if(q.length<3)return;let n=0;
  for(const b of DATA.books){for(let e=0;e<b.episodes.length&&n<50;e++){
    for(const p of b.episodes[e].p){const i=p.toLowerCase().indexOf(q);
      if(i>=0){n++;
        const el=document.createElement("button");el.className="srow";
        const pre=p.slice(Math.max(0,i-70),i),hit=p.slice(i,i+q.length),post=p.slice(i+q.length,i+q.length+90);
        el.innerHTML=`<div class="w">${b.glyph} ${esc(b.title)} · ${esc(b.episodes[e].t)}</div>
          <div class="s">…${esc(pre)}<mark>${esc(hit)}</mark>${esc(post)}…</div>`;
        el.onclick=()=>{$("search").classList.remove("on");openEp(b.id,e)};
        w.appendChild(el);break}}}}
  if(!n)w.innerHTML='<p style="color:var(--tx2)">Nothing in the vault matches that.</p>';
}

let F={words:[],i:0,timer:null,playing:false};
$("r-flow").onclick=()=>{const b=bookById(CUR.b);if(!b)return;
  F.words=b.episodes[CUR.e].p.join(" ").split(/\s+/).filter(Boolean);F.i=0;
  $("f-wpm").value=S.wpm;$("f-wpmv").textContent=S.wpm;
  $("flow").classList.add("on");startFlow()};
function startFlow(){F.playing=true;$("f-play").textContent="⏸ pause";tick()}
function tick(){
  if(!F.playing)return;
  if(F.i>=F.words.length){$("fword").innerHTML="— <b>fin</b> —";F.playing=false;$("f-play").textContent="↻ replay";F.i=0;return}
  const w=F.words[F.i++];
  const mid=Math.max(0,Math.ceil(w.length/2)-1);
  $("fword").innerHTML=esc(w.slice(0,mid))+"<b>"+esc(w[mid]||"")+"</b>"+esc(w.slice(mid+1));
  $("fpfill").style.width=(F.i/F.words.length*100)+"%";
  let ms=60000/S.wpm;
  if(w.length>8)ms*=1.4;if(/[.!?;:]$/.test(w))ms*=1.8;
  F.timer=setTimeout(tick,ms);
}
function stopFlow(){F.playing=false;clearTimeout(F.timer)}
$("f-play").onclick=()=>{if(F.playing){stopFlow();$("f-play").textContent="▶ play"}else startFlow()};

function injectFigures(body,ep,b){
  const ps=[...body.querySelectorAll(":scope>p")];
  if(ps.length<4)return;
  let seed=99+ep.p.length;for(const c of b.id)seed=seed*31+c.charCodeAt(0)|0;
  const rnd=mulberry(seed);
  const used=new Set();let placed=0,lastIdx=-3;
  const max=Math.min(4,Math.max(1,Math.floor(ps.length/3)));
  for(let i=2;i<ps.length-1&&placed<max;i++){
    if(i-lastIdx<3)continue;
    const txt=ps[i].textContent;if(txt.length<90)continue;
    const hits=FIGURES.filter(f=>!used.has(f.id)&&f.kw.test(txt));
    if(!hits.length)continue;
    const fig=hits[Math.floor(rnd()*hits.length)];
    const fc=document.createElement("figure");
    fc.className="sidefig "+(placed%2?"left":"right");
    fc.innerHTML=fig.svg(b.accent)+`<figcaption>${fig.cap}</figcaption>`;
    ps[i].parentNode.insertBefore(fc,ps[i]);
    used.add(fig.id);placed++;lastIdx=i;
  }
}

/* ============ THE PATH (dependency-locked idea graph) ============ */
const NODE_XP=80;
const nodeById=id=>DATA.nodes.find(n=>n.id===id);
const trackById=id=>DATA.tracks.find(t=>t.id===id);
function nodeDone(id){return !!(DATA&&S.node[id]&&S.node[id].doneAt)}
function nodeAvail(id){const n=nodeById(id);return !!n&&n.prereq.every(p=>nodeDone(p))}
function nodeStatus(id){return nodeDone(id)?"done":(nodeAvail(id)?"avail":"locked")}
function nodesDone(){return (DATA&&DATA.nodes)?DATA.nodes.filter(n=>nodeDone(n.id)).length:0}
function trackDone(tid){if(!DATA)return false;const ns=DATA.nodes.filter(n=>n.track===tid&&!n.stub);return ns.length>0&&ns.every(n=>nodeDone(n.id))}
function nextAvailNode(){const o=[...DATA.nodes].sort((a,b)=>a.tier-b.tier);
  return o.find(n=>!n.stub&&nodeStatus(n.id)==="avail")||o.find(n=>nodeStatus(n.id)==="avail")||null}

function renderPath(){
  renderTopbar();
  const nx=nextAvailNode(),c=$("pathcont");
  if(nx){const tr=trackById(nx.track);c.style.display="block";
    c.innerHTML=`<div class="tag" style="color:${tr.accent}">▶ CONTINUE THE PATH</div>
      <div style="font-family:var(--serif);font-size:20px;margin:2px 0 4px">${nx.glyph} ${esc(nx.title)}</div>
      <div style="color:var(--tx2);font-size:13px">${esc(tr.name)} · ${nx.stub?"preview":"read → quiz → apply to unlock what comes next"}</div>
      <div class="glyphbg">${tr.glyph}</div>`;
    c.onclick=()=>openNode(nx.id);
  } else c.style.display="none";
  const tree=$("tree");tree.innerHTML="";
  for(const tr of DATA.tracks){
    const col=document.createElement("div");col.className="track";col.style.setProperty("--tacc",tr.accent);
    const ns=DATA.nodes.filter(n=>n.track===tr.id).sort((a,b)=>a.tier-b.tier);
    const doneN=ns.filter(n=>nodeDone(n.id)).length;
    let html=`<div class="track-h"><span class="tg">${tr.glyph}</span><span class="tn">${esc(tr.name)}</span><span class="tp">${doneN}/${ns.length}</span></div>
      <div class="track-blurb">${esc(tr.blurb)}</div>`;
    ns.forEach((n,si)=>{
      const st=nodeStatus(n.id);
      const badge=st==="done"?"✓":st==="avail"?"▸":"🔒";
      let sub;
      if(st==="locked"){const need=n.prereq.filter(p=>!nodeDone(p)).map(p=>{const x=nodeById(p);return x?x.title:p});
        sub=`<div class="nsub" ${n.whyreq?`title="${esc(n.whyreq)}"`:""}>needs: ${esc(need.join(", "))}</div>`;}
      else if(st==="done") sub=`<div class="nsub">mastered</div>`;
      else if(n.stub) sub=`<div class="nsub">preview · full lesson next</div>`;
      else sub=`<div class="nsub">ready — tap to begin</div>`;
      const just=(S._justUnlocked&&S._justUnlocked.includes(n.id))?" just":"";
      html+=`<button class="tnode ${st}${just}" data-node="${n.id}"><span class="ng">${n.glyph}</span>`+
        `<span class="ntx"><span class="stg">STAGE ${si+1}</span><span class="nt">${esc(n.title)}</span>${sub}</span><span class="badge">${badge}</span></button>`;
    });
    col.innerHTML=html;tree.appendChild(col);
  }
  S._justUnlocked=null;
  tree.querySelectorAll("[data-node]").forEach(b=>b.onclick=()=>openNode(b.dataset.node));
}

let CURN=null;
function nodeFigure(body,accent,seedId){
  const ps=[...body.querySelectorAll(":scope>p")];
  if(ps.length<2)return;
  let seed=7;for(const ch of seedId)seed=seed*31+ch.charCodeAt(0)|0;
  const rnd=mulberry(seed);const used=new Set();let placed=0,last=-2;
  const max=Math.min(3,ps.length-1);
  for(let i=1;i<ps.length&&placed<max;i++){
    if(i-last<2)continue;
    const hits=FIGURES.filter(f=>!used.has(f.id)&&f.kw.test(ps[i].textContent));
    if(!hits.length)continue;
    const fig=hits[Math.floor(rnd()*hits.length)];
    const fc=document.createElement("figure");fc.className="sidefig "+(placed%2?"left":"right")+" vis";
    fc.innerHTML=fig.svg(accent)+`<figcaption>${fig.cap}</figcaption>`;
    ps[i].parentNode.insertBefore(fc,ps[i]);used.add(fig.id);placed++;last=i;
  }
}
function openNode(id){
  const n=nodeById(id);if(!n)return;CURN=id;
  const tr=trackById(n.track),st=nodeStatus(id);
  $("n-title").textContent=`${tr.glyph} ${tr.name}`;
  const body=$("nbody");body.style.fontSize=S.font+"px";body.innerHTML="";
  const gate=$("ngate");gate.innerHTML="";
  const h=document.createElement("h1");h.textContent=n.title;body.appendChild(h);
  const tns=DATA.nodes.filter(x=>x.track===n.track).sort((a,b)=>a.tier-b.tier);
  const stg=tns.findIndex(x=>x.id===n.id)+1;
  const sub=document.createElement("div");sub.className="nsubh";
  sub.textContent=`${tr.name.toUpperCase()} · STAGE ${stg} OF ${tns.length} · ${st==="done"?"MASTERED ✓":st==="locked"?"LOCKED":"+"+NODE_XP+" XP TO MASTER"}`;
  body.appendChild(sub);
  if(st==="locked"){
    const need=n.prereq.filter(p=>!nodeDone(p)).map(p=>nodeById(p));
    gate.innerHTML=`<div class="locknote">🔒 <b>This idea is locked.</b><br><br>First master:<br>`+
      need.map(x=>`${x.glyph} ${esc(x.title)}`).join("<br>")+
      (n.whyreq?`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:12.5px;line-height:1.6;text-align:left"><b style="color:var(--gold)">Why this lock is real:</b><br>${esc(n.whyreq)}</div>`:"")+
      `<br><button class="ghostbtn" id="lockback">← Back to the Path</button></div>`;
    $("lockback").onclick=()=>{renderPath();show("path")};
    show("node");return;
  }
  const g=document.createElement("div");g.className="lblrow guide";g.textContent="✦ Guide note — written for you";body.appendChild(g);
  for(const p of n.bridge){const el=document.createElement("p");el.textContent=p;body.appendChild(el)}
  (S.node[id]=S.node[id]||{}).read=true;save();
  if(!n.stub&&n.sources){
    const sh=document.createElement("div");sh.className="lblrow books";sh.textContent="📖 From the books";body.appendChild(sh);
    for(const s of n.sources){const d=document.createElement("div");d.className="src";
      d.innerHTML=`<div class="attr">${esc(s.book)} — ${esc(s.ref)}</div>`+s.quote.map(q=>`<p>“${esc(q)}”</p>`).join("");
      body.appendChild(d);}
  }
  nodeFigure(body,tr.accent,n.id);
  if(n.stub){
    gate.innerHTML=`<div class="stubnote"><div class="e">🚧</div><b>This lesson is coming next.</b>
      <div style="color:var(--tx2);font-size:13px;margin-top:8px;line-height:1.5">You've unlocked the preview. In chat, press “continue” and I'll author the full ${esc(tr.name)} lesson — book sources, quiz, and practice — so it becomes masterable.</div>
      <div style="margin-top:14px"><button class="ghostbtn" id="stubback">← Back to the Path</button></div></div>`;
    $("stubback").onclick=()=>{renderPath();show("path")};
    show("node");return;
  }
  renderGate(n);
  show("node");
}
function renderGate(n){
  const gate=$("ngate");gate.innerHTML="";
  const rec=S.node[n.id]||{};
  if(rec.doneAt){
    gate.innerHTML=`<div class="gatecard"><h3>✓ Mastered</h3>
      <div class="gsub">You've completed this idea.${rec.applied?" Your practice note:":""}</div>
      ${rec.applied?`<p style="font-family:var(--serif);color:#ded9cf;line-height:1.6">“${esc(rec.applied)}”</p>`:""}
      <div style="margin-top:14px"><button class="ghostbtn" id="gpath2">← Back to the Path</button></div></div>`;
    $("gpath2").onclick=()=>{renderPath();show("path")};return;
  }
  if(rec.quizBest>=100){renderApply(n);return;}
  const card=document.createElement("div");card.className="gatecard";
  card.innerHTML=`<h3>Check your understanding</h3><div class="gsub">Get all of them right to unlock the practice step. Retry as often as you like — this is for you.</div>`;
  n.quiz.forEach((q,qi)=>{
    const item=document.createElement("div");item.className="qitem";
    item.innerHTML=`<div class="qq"><span class="qnum">Q${qi+1}</span>${esc(q.q)}</div>`;
    // shuffle choices so answer position carries no signal
    const order=q.c.map((_,i)=>i);
    for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
    item.dataset.correct=order.indexOf(q.a);
    order.forEach((oi,ci)=>{
      const b=document.createElement("button");b.className="choice";b.textContent=q.c[oi];
      b.onclick=()=>{item.querySelectorAll(".choice").forEach(x=>x.classList.remove("sel","right","wrong"));
        item.querySelector(".qwhy").classList.remove("on");b.classList.add("sel");item.dataset.pick=ci;};
      item.appendChild(b);
    });
    const why=document.createElement("div");why.className="qwhy";item.appendChild(why);
    card.appendChild(item);
  });
  const submit=document.createElement("button");submit.className="goldbtn";submit.textContent="Submit answers";
  const msg=document.createElement("div");
  submit.onclick=()=>gradeQuiz(n,card,msg);
  card.appendChild(submit);card.appendChild(msg);
  gate.appendChild(card);
}
function gradeQuiz(n,card,msg){
  const items=[...card.querySelectorAll(".qitem")];let correct=0,answered=true;
  items.forEach((item,qi)=>{
    if(item.dataset.pick===undefined){answered=false;return;}
    const pick=+item.dataset.pick,good=+item.dataset.correct,q=n.quiz[qi],choices=[...item.querySelectorAll(".choice")];
    choices.forEach(c=>c.classList.remove("right","wrong"));
    if(pick===good){choices[pick].classList.add("right");correct++;}
    else{choices[pick].classList.add("wrong");choices[good].classList.add("right");}
    const why=item.querySelector(".qwhy");why.innerHTML=`<b>Why:</b> ${esc(q.why)}`;why.classList.add("on");
  });
  if(!answered){msg.className="gatemsg bad";msg.textContent="Answer every question first.";return;}
  if(correct===n.quiz.length){
    (S.node[n.id]=S.node[n.id]||{}).quizBest=100;save();
    msg.className="gatemsg good";msg.textContent="All correct. The practice step is unlocked below ↓";
    toast("✓ Understanding confirmed");setTimeout(()=>renderApply(n),750);
  }else{msg.className="gatemsg bad";msg.textContent=`${correct} of ${n.quiz.length} correct — read the explanations and try again.`;}
}
function renderApply(n){
  const gate=$("ngate");gate.innerHTML="";const rec=S.node[n.id]||{};const min=(n.apply&&n.apply.min)||40;
  const card=document.createElement("div");card.className="gatecard";card.id="applybox";
  card.innerHTML=`<h3>Apply it</h3><div class="gsub">${esc(n.apply.prompt)}</div>`;
  const ta=document.createElement("textarea");ta.value=rec.applied||"";ta.placeholder=`Write from your own life… (at least ${min} characters)`;
  const cc=document.createElement("div");cc.className="cc";
  const btn=document.createElement("button");btn.className="goldbtn";btn.textContent=`Master this idea  +${NODE_XP} XP`;
  const upd=()=>{const len=ta.value.trim().length;cc.textContent=len+" / "+min;btn.disabled=len<min;btn.style.opacity=len<min?.5:1;};
  ta.oninput=upd;
  btn.onclick=()=>{if(ta.value.trim().length<min)return;(S.node[n.id]=S.node[n.id]||{}).applied=ta.value.trim();completeNode(n);};
  card.appendChild(ta);card.appendChild(cc);card.appendChild(btn);gate.appendChild(card);upd();
}
function completeNode(n){
  const rec=S.node[n.id]=S.node[n.id]||{};
  if(!rec.doneAt){
    rec.doneAt=Date.now();const before=lvl();S.xp+=NODE_XP;
    const d=today();
    if(S.streak.day!==d){S.streak.count=S.streak.day===yesterday()?S.streak.count+1:1;S.streak.day=d;}
    (S.days[d]=S.days[d]||{})[["A","B","C"].includes(n.track)?"light":"shadow"]=true;
    save();
    toast(`+${NODE_XP} XP · “${n.title}” mastered`,true);
    if(lvl()>before)setTimeout(()=>toast(`⬆ LEVEL ${lvl()} — ${lvlName()}`,true),750);
    checkAch();
  }
  const unlocked=DATA.nodes.filter(c=>c.prereq.includes(n.id)&&nodeAvail(c.id)&&!nodeDone(c.id));
  S._justUnlocked=unlocked.map(u=>u.id);
  const gate=$("ngate");
  gate.innerHTML=`<div class="gatecard"><h3>✓ Mastered</h3>
    <div class="gsub">${unlocked.length?"You unlocked "+unlocked.map(u=>esc(u.glyph+" "+u.title)).join(", ")+".":"Your note is saved. Keep going."}</div>
    <button class="goldbtn" id="gnext">Next idea →</button>
    <button class="ghostbtn" id="gpath" style="margin-left:6px">Back to the Path</button></div>`;
  $("gpath").onclick=()=>{renderPath();show("path")};
  $("gnext").onclick=()=>{const nx=nextAvailNode();if(nx)openNode(nx.id);else{renderPath();show("path")}};
  if(unlocked.length)setTimeout(()=>toast(`🔓 Unlocked ${unlocked.length} new idea${unlocked.length>1?"s":""}`),400);
}
$("n-back").onclick=()=>{renderPath();show("path")};
$("n-fminus").onclick=()=>{S.font=Math.max(14,S.font-1);$("nbody").style.fontSize=S.font+"px";save()};
$("n-fplus").onclick=()=>{S.font=Math.min(24,S.font+1);$("nbody").style.fontSize=S.font+"px";save()};

/* ---------- pull quote pick ---------- */
function pickPull(ep){
  let best=-1,dist=1e9;
  const lo=Math.floor(ep.p.length*.2),hi=Math.ceil(ep.p.length*.85);
  for(let i=lo;i<hi;i++){const L=ep.p[i].length;
    if(L>=70&&L<=230&&!/[©®™]|copyright|isbn|all rights/i.test(ep.p[i])){
      const d=Math.abs(i-ep.p.length/2);if(d<dist){dist=d;best=i}}}
  return best;
}

/* ---------- generative episode art ---------- */
let ART={raf:null};
function stopArt(){if(ART.raf)cancelAnimationFrame(ART.raf);ART.raf=null}
function drawArt(canvas,b,e){
  stopArt();
  if(!canvas.isConnected)return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const W=canvas.clientWidth||660,H=canvas.clientHeight||150;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  let seed=e+7;for(const c of b.id)seed=seed*31+c.charCodeAt(0)|0;
  const rnd=mulberry(seed);
  const shadow=b.wing==="shadow",A=b.accent;
  const al=(hex,a)=>hex+Math.max(0,Math.min(255,Math.round(a*255))).toString(16).padStart(2,"0");
  const style=Math.floor(rnd()*3);
  const P=[];for(let i=0;i<34;i++)P.push({x:rnd()*W,y:rnd()*H,r:1+rnd()*2.4,s:.2+rnd()*.8,ph:rnd()*6.28});
  const still=matchMedia("(prefers-reduced-motion: reduce)").matches;
  let t=rnd()*100;
  function frame(){
    t+=.016;
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,shadow?"#151019":"#0d1517");g.addColorStop(1,"#0a0c12");
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    if(style===0){ // embers (shadow) / fireflies (light)
      for(const p of P){
        const y=((p.y-t*12*p.s)%H+H)%H, x=p.x+Math.sin(t*p.s+p.ph)*14;
        const a=.2+.5*Math.abs(Math.sin(t*p.s+p.ph));
        ctx.beginPath();ctx.arc(x,shadow?H-y:y,p.r,0,7);
        ctx.shadowColor=A;ctx.shadowBlur=8;ctx.fillStyle=al(A,a);ctx.fill();ctx.shadowBlur=0;}
    }else if(style===1&&shadow){ // web of influence
      for(let i=0;i<P.length;i++){const p=P[i];
        p.x=(p.x+Math.sin(t*.3+p.ph)*.3+W)%W;p.y=(p.y+Math.cos(t*.25+p.ph)*.25+H)%H;
        for(let j=i+1;j<P.length;j++){const q=P[j],d=Math.hypot(p.x-q.x,p.y-q.y);
          if(d<85){ctx.strokeStyle=al(A,.14);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke()}}
        ctx.fillStyle=al(A,.65);ctx.beginPath();ctx.arc(p.x,p.y,1.6,0,7);ctx.fill();}
    }else if(style===1){ // ripples
      for(let i=0;i<5;i++){const r=(t*22+i*40)%210,a=Math.max(0,1-r/210);
        ctx.strokeStyle=al(A,a*.4);ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(W/2,H/2,r,0,7);ctx.stroke();}
    }else if(shadow){ // smoke sines
      for(let k=0;k<4;k++){ctx.beginPath();
        for(let x=0;x<=W;x+=8){const y=H/2+Math.sin(x*.02+t*(.5+k*.2)+k*2)*(14+k*8);
          x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
        ctx.strokeStyle=al(A,[.33,.25,.18,.12][k]);ctx.lineWidth=1.4;ctx.stroke();}
    }else{ // breathing pacer — 8s cycle, follow the circle
      const ph=(t%8)/8,inhale=ph<.5,x=inhale?ph*2:(ph-.5)*2,ease=.5-.5*Math.cos(Math.PI*x);
      const r=24+34*(inhale?ease:1-ease);
      ctx.beginPath();ctx.arc(W/2,H/2-6,r,0,7);ctx.fillStyle=al(A,.13);ctx.fill();
      ctx.beginPath();ctx.arc(W/2,H/2-6,r,0,7);ctx.strokeStyle=al(A,.8);ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle=al(A,.7);ctx.font="11px system-ui";ctx.textAlign="center";
      ctx.fillText(inhale?"breathe in":"breathe out",W/2,H-12);}
    ctx.globalAlpha=.15;ctx.font="60px serif";ctx.textAlign="right";ctx.textBaseline="middle";
    ctx.fillText(b.glyph,W-16,H/2);ctx.globalAlpha=1;
    if(!still)ART.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ---------- face unlock (WebAuthn PRF / Windows Hello) ---------- */
const BIO_SALT=new TextEncoder().encode("vault-prf-salt-v1");
const b64e=u=>{const b=new Uint8Array(u);let s="";for(const c of b)s+=String.fromCharCode(c);
  return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"")};
async function bioSecret(idB64){
  const a=await navigator.credentials.get({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials:[{type:"public-key",id:b64d(idB64)}],
    userVerification:"required",timeout:60000,
    extensions:{prf:{eval:{first:BIO_SALT}}}}});
  const r=a.getClientExtensionResults().prf?.results?.first;
  if(!r)throw new Error("no-prf");
  return r;
}
async function enrollBio(){
  const k=localStorage.getItem(LS_KEY);
  if(!k){toast("Unlock the vault first");return}
  if(localStorage.getItem("vault_bio")){toast("👁️ Face unlock already active on this device");return}
  try{
    const cred=await navigator.credentials.create({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      rp:{name:"The Vault",id:location.hostname},
      user:{id:crypto.getRandomValues(new Uint8Array(16)),name:"keyholder",displayName:"Keyholder"},
      pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],
      authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},
      timeout:60000,extensions:{prf:{}}}});
    const idB64=b64e(cred.rawId);
    const secret=await bioSecret(idB64);
    const wk=await crypto.subtle.importKey("raw",secret,"AES-GCM",false,["encrypt"]);
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},wk,b64d(k));
    localStorage.setItem("vault_bio",JSON.stringify({id:idB64,iv:b64e(iv),ct:b64e(ct)}));
    toast("👁️ Face unlock enabled on this device",true);
  }catch(err){
    toast(err.message==="no-prf"?"This browser can't derive keys from Hello yet":"Face unlock unavailable: "+err.name,true);
  }
}
async function bioUnlock(){
  try{
    const rec=JSON.parse(localStorage.getItem("vault_bio"));
    const secret=await bioSecret(rec.id);
    const wk=await crypto.subtle.importKey("raw",secret,"AES-GCM",false,["decrypt"]);
    const kb=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(rec.iv)},wk,b64d(rec.ct));
    const k=b64e(kb);
    DATA=await tryLoad(k);localStorage.setItem(LS_KEY,k);
    landing();checkAch();
  }catch(err){$("keyerr").textContent="Face unlock failed — use your link or key."}
}
$("btn-bio").onclick=enrollBio;
$("keybio").onclick=bioUnlock;
if(!window.PublicKeyCredential)$("btn-bio").style.display="none";

boot();
